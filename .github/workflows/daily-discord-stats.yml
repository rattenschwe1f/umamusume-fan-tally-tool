name: Daily Discord Stats

on:
  push:
    branches:
      - main
  schedule:
    - cron: "5 15 * * *"      # Runs at 15:05 UTC daily
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # This forces GitHub to use Node.js 24 for actions that still support it
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6          # Updated to v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6       # Updated to v6 (supports Node 24)
        with:
          node-version: 22                # You can change to 22 or 24 later if you want
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Cypress binary
        run: pnpm exec cypress install

      - name: Verify Cypress binary
        run: pnpm exec cypress verify

      - name: Collect latest stats
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: pnpm run collect:stats

      - name: Send Discord webhook message
        run: node scripts/discord-webhook.js
